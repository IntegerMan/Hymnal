name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build and publish (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore Hymnal.sln

      - name: Build
        run: dotnet build Hymnal.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/Hymnal.Core.Tests/ --configuration Release --no-build --no-restore

      - name: Publish
        run: dotnet publish src/Hymnal/Hymnal.csproj --configuration Release --runtime ${{ matrix.rid }} --self-contained true --output publish/${{ matrix.rid }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hymnal-${{ matrix.rid }}-${{ github.ref_name }}
          path: publish/${{ matrix.rid }}
