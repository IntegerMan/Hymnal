name: CI

on:
  push:
    branches:
      - main
      - 'milestone/*'
  pull_request:

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Show commit and package versions
        run: |
          git rev-parse HEAD
          grep -i reactive src/Hymnal/Hymnal.csproj

      - name: Clear NuGet cache
        run: dotnet nuget locals all --clear

      - name: Restore
        run: dotnet restore Hymnal.slnx

      - name: Verify resolved ReactiveUI graph
        run: dotnet list src/Hymnal/Hymnal.csproj package --include-transitive | grep -iE 'reactiveui|splat'

      - name: Build
        run: dotnet build Hymnal.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/Hymnal.Core.Tests/ --configuration Release --no-build --no-restore
