name: CI

on:
  push:
    branches:
      - main
      - 'milestone/*'
  pull_request:

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore Hymnal.sln

      - name: Build
        run: dotnet build Hymnal.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/Hymnal.Core.Tests/ --configuration Release --no-build --no-restore
